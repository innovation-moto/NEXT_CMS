name: Notion Sync

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分ごと
  workflow_dispatch:  # 管理画面から手動実行も可能

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Notion changes to CMS
        run: |
          curl -s -f -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://next-cms-gilt.vercel.app/api/notion-sync
